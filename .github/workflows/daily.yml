name: 🟢 Smart Daily Commits

on:
  schedule:
    - cron: '0 3,9,15 * * *'   # 3 times per day
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check if weekend
        run: |
          DAY=$(date +%u)
          if [ "$DAY" -ge 6 ]; then
            echo "Weekend - skipping commit"
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Make update with variation
        if: env.SKIP != 'true'
        run: |
          echo "$(date '+%Y-%m-%d %H:%M:%S') — update $RANDOM" >> log.txt

      - name: Commit and push
        if: env.SKIP != 'true'
        run: |
          git config --global user.name "syedmohammedumarumar"
          git config --global user.email "mohammedumarsyed47@gmail.com"

          git add log.txt
          git commit -m "update — $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"

          git push origin HEAD:main